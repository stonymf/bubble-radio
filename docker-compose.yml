version: '3.8'
services:
  bubble-radio-app:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - ./logs:/usr/src/app/logs
      - ./playlists:/usr/src/app/playlists
      - ./db.db:/usr/src/app/db.db
      - ${DOWNLOAD_DIRECTORY}:/usr/src/app/downloads
    command: /bin/bash -c "gunicorn --bind 0.0.0.0:5000 --timeout 120 --preload --workers 1 src.app:app"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  bubble-radio-icecast:
    image: pltnk/icecast2
    env_file:
      - .env
    volumes:
      - ./icecast.xml:/etc/icecast2/icecast.xml

  bubble-radio-streams:
    build:
      context: .
      dockerfile: Dockerfile.streams
    working_dir: /usr/src/app
    ports:
      - "${LIVE_STREAM_PORT}:${LIVE_STREAM_PORT}"
    env_file:
      - .env
    volumes:
      - .:/usr/src/app
      - ./logs:/usr/src/app/logs
      - ./playlists:/usr/src/app/playlists
      - ./db.db:/usr/src/app/db.db
      - ${DOWNLOAD_DIRECTORY}:/usr/src/app/downloads
    depends_on:
      - bubble-radio-app
      - bubble-radio-icecast
    command: /bin/bash -c "./src/start_streams.sh"

  bubble-radio-bot:
    build:
      context: .
      dockerfile: Dockerfile.app
    env_file:
      - .env
    command: python -m src.bot
    depends_on:
      - bubble-radio-app
    restart: unless-stopped

  nginx:
    image: nginx:latest
    ports:
      - "${RADIO_PORT}:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bubble-radio-app
      - bubble-radio-icecast
