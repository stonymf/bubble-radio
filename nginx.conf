events {}

http {
    upstream flask_app {
        server corecore-app:5000;
    }

    upstream icecast_server {
        server corecore-icecast:8000;
    }

    server {
        listen 8000;

        location /get_original_url/ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://flask_app;
        }

        location /add_song {
            proxy_pass http://flask_app;
        }

        location ~ ^/(admin|demo|download|download_playlist|download_progress|feedthechao|download_archive|download_db|play|health) {
            proxy_pass http://flask_app;
        }

        location /static/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            # CORS headers (handled here, not in external nginx, because
            # subs_filter in external nginx breaks add_header on error responses)
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Headers "Origin, Accept, X-Requested-With, Content-Type, If-Modified-Since, Icy-Metadata, Range" always;
            add_header Access-Control-Expose-Headers "Icy-MetaInt, Icy-Br, Icy-Description, Icy-Genre, Icy-Name, Ice-Audio-Info, Icy-Url, Icy-Sr, Icy-Vbr, Icy-Pub, Content-Length, Content-Range" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD" always;

            if ($request_method = OPTIONS) {
                return 204;
            }

            proxy_pass http://icecast_server;
        }
    }
}